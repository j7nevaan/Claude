name: Deploy AI Website Builder to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ai-website-builder/package-lock.json

      - name: Install dependencies
        working-directory: ai-website-builder
        run: npm ci

      - name: Generate Prisma client
        working-directory: ai-website-builder
        run: npx prisma generate

      - name: Build static export
        working-directory: ai-website-builder
        run: npm run build
        env:
          GITHUB_ACTIONS: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ai-website-builder/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
